name: Fix and Reschedule Future Posts

on:
  workflow_dispatch:

jobs:
  fix_queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update apt package database
        run: sudo apt-get update

      - name: Install Scrapling
        run: |
          pip install "scrapling[fetchers]"
          scrapling install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Fix Scheduled Script
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node fix_scheduled_posts.js

      - name: Commit and push queue.json changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add queue.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update queue.json with corrected posts" && git push)
